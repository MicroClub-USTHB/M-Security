name: m_security
description: >-
  A high-performance cryptographic SDK for Flutter powered by native Rust via FFI.
  Provides authenticated encryption (AES-256-GCM, ChaCha20-Poly1305), modern hashing
  (BLAKE3, SHA-3, Argon2id), and key derivation (HKDF-SHA256) with secure memory management.
version: 0.0.1
homepage: https://github.com/MicroClub-USTHB/M-Security
repository: https://github.com/MicroClub-USTHB/M-Security
issue_tracker: https://github.com/MicroClub-USTHB/M-Security/issues
topics:
  - cryptography
  - encryption
  - security
  - rust
  - ffi

environment:
  sdk: ^3.10.8
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.11.1
  freezed_annotation: ^3.1.0
  plugin_platform_interface: ^2.0.2
  rust_lib_m_security:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  freezed: ^3.2.5
  build_runner: ^2.11.1
  test: ^1.29.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.m_security
        pluginClass: MSecurityPlugin
      ios:
        pluginClass: MSecurityPlugin
      linux:
        pluginClass: MSecurityPlugin
      macos:
        pluginClass: MSecurityPlugin
      windows:
        pluginClass: MSecurityPluginCApi
