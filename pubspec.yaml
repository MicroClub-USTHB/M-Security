name: m_security
description: >-
  A native Rust cryptographic SDK for Flutter via FFI. AES-256-GCM, ChaCha20-Poly1305,
  BLAKE3, SHA-3, Argon2id, HKDF, streaming encryption, and encrypted virtual file system.
version: 0.3.5
homepage: https://github.com/MicroClub-USTHB/M-Security
repository: https://github.com/MicroClub-USTHB/M-Security
issue_tracker: https://github.com/MicroClub-USTHB/M-Security/issues
topics:
  - cryptography
  - encryption
  - security
  - rust
  - ffi

environment:
  sdk: ^3.10.8
  flutter: '>=3.3.0'

dependencies:
  collection: ^1.18.0
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.11.1
  freezed_annotation: ^3.1.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  freezed: ^3.2.5
  build_runner: ^2.11.1
  test: ^1.29.0
  ffigen: ^20.1.1

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
